<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete WBS Network - All 380+ Tasks</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e27;
            color: #eee;
            overflow: hidden;
        }
        
        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        #graph {
            width: 100%;
            height: 100%;
        }
        
        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(10, 14, 39, 0.95);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            max-width: 320px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .controls h2 {
            margin: 0 0 15px 0;
            font-size: 18px;
            color: #667eea;
        }
        
        .control-group {
            margin-bottom: 15px;
        }
        
        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 11px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .control-group select,
        .control-group input {
            width: 100%;
            padding: 8px;
            background: #16213e;
            border: 1px solid #667eea;
            border-radius: 6px;
            color: #eee;
            font-size: 13px;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        
        .checkbox-group input[type="checkbox"] {
            width: auto;
        }
        
        .checkbox-group label {
            margin: 0;
            text-transform: none;
            font-size: 13px;
        }
        
        .legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(10, 14, 39, 0.95);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            max-width: 300px;
        }
        
        .legend h3 {
            margin: 0 0 15px 0;
            font-size: 14px;
            color: #667eea;
        }
        
        .legend-section {
            margin-bottom: 15px;
        }
        
        .legend-section h4 {
            margin: 0 0 8px 0;
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 11px;
        }
        
        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            margin-right: 8px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        
        .legend-line {
            width: 30px;
            height: 2px;
            margin-right: 8px;
        }
        
        .info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(10, 14, 39, 0.95);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            max-width: 400px;
            max-height: 90vh;
            overflow-y: auto;
            display: none;
        }
        
        .info-panel.active {
            display: block;
        }
        
        .info-panel h3 {
            margin: 0 0 10px 0;
            color: #667eea;
            font-size: 16px;
            padding-right: 30px;
        }
        
        .info-panel .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #aaa;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            line-height: 30px;
            text-align: center;
        }
        
        .info-panel .close-btn:hover {
            color: #fff;
        }
        
        .info-row {
            margin-bottom: 10px;
            font-size: 13px;
        }
        
        .info-label {
            color: #aaa;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 3px;
        }
        
        .info-value {
            color: #eee;
        }
        
        .critical-badge {
            display: inline-block;
            background: #f5576c;
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
        }
        
        .stats {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(10, 14, 39, 0.95);
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            display: flex;
            gap: 20px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 10px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* Node styles */
        .node {
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .node:hover {
            filter: brightness(1.4);
        }
        
        .node circle {
            stroke-width: 2px;
            stroke: rgba(255, 255, 255, 0.2);
        }
        
        .node.parent circle {
            stroke-width: 3px;
            stroke: rgba(255, 255, 255, 0.5);
        }
        
        .node.critical circle {
            stroke: #f5576c;
            stroke-width: 3px;
        }
        
        .node.selected circle {
            stroke: #fff;
            stroke-width: 4px;
        }
        
        .node text {
            font-size: 9px;
            fill: #eee;
            text-anchor: middle;
            pointer-events: none;
            text-shadow: 0 0 3px rgba(0, 0, 0, 0.9);
        }
        
        /* Link styles */
        .link {
            fill: none;
        }
        
        .link.direct {
            stroke: rgba(102, 126, 234, 0.5);
            stroke-width: 2px;
        }
        
        .link.indirect {
            stroke: rgba(102, 126, 234, 0.2);
            stroke-width: 1px;
            stroke-dasharray: 4, 4;
        }
        
        .link.critical {
            stroke: rgba(245, 87, 108, 0.7);
            stroke-width: 3px;
        }
        
        .link-label {
            font-size: 8px;
            fill: #aaa;
            text-anchor: middle;
            pointer-events: none;
        }
        
        .search-box {
            width: 100%;
            padding: 10px;
            background: #16213e;
            border: 1px solid #667eea;
            border-radius: 6px;
            color: #eee;
            font-size: 13px;
            margin-bottom: 15px;
        }
        
        .search-box::placeholder {
            color: #666;
        }
    </style>
</head>
<body>
    <div id="container">
        <svg id="graph"></svg>
        
        <div class="controls">
            <h2>🎛️ Controls</h2>
            
            <input type="text" id="searchBox" class="search-box" placeholder="Search tasks...">
            
            <div class="control-group">
                <label>View Level</label>
                <select id="viewLevel">
                    <option value="all">All Subtasks (380+)</option>
                    <option value="parent">Parent Tasks Only (25)</option>
                    <option value="milestone1">Milestone 1 Detail</option>
                    <option value="milestone2">Milestone 2 Detail</option>
                    <option value="milestone3">Milestone 3 Detail</option>
                    <option value="milestone4">Milestone 4 Detail</option>
                    <option value="milestone5">Milestone 5 Detail</option>
                    <option value="milestone6">Milestone 6 Detail</option>
                </select>
            </div>
            
            <div class="control-group">
                <label>Agent Filter</label>
                <select id="agentFilter">
                    <option value="all">All Agents</option>
                    <option value="ARCH">ARCH</option>
                    <option value="DEV">DEV</option>
                    <option value="CRYPTO">CRYPTO</option>
                    <option value="DEVOPS">DEVOPS</option>
                    <option value="UX">UX</option>
                    <option value="SEC">SEC</option>
                    <option value="QA">QA</option>
                    <option value="ALL">ALL (Team)</option>
                </select>
            </div>
            
            <div class="control-group">
                <label>Connection Types</label>
                <div class="checkbox-group">
                    <input type="checkbox" id="showDirect" checked>
                    <label for="showDirect">Direct Dependencies</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="showIndirect" checked>
                    <label for="showIndirect">Indirect Connections</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="showCritical" checked>
                    <label for="showCritical">Critical Path Only</label>
                </div>
            </div>
            
            <div class="control-group">
                <label>Node Size: <span id="nodeSizeValue">12</span>px</label>
                <input type="range" id="nodeSize" min="6" max="30" value="12">
            </div>
            
            <div class="control-group">
                <label>Force Strength: <span id="forceValue">-200</span></label>
                <input type="range" id="forceStrength" min="-500" max="-50" value="-200">
            </div>
            
            <div class="control-group">
                <label>Link Distance: <span id="linkDistValue">100</span>px</label>
                <input type="range" id="linkDistance" min="50" max="300" value="100">
            </div>
        </div>
        
        <div class="legend">
            <h3>📊 Legend</h3>
            
            <div class="legend-section">
                <h4>Milestones</h4>
                <div class="legend-item">
                    <div class="legend-color" style="background: #667eea;"></div>
                    <span>Foundation & Setup</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #764ba2;"></div>
                    <span>Platform Customization</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #f093fb;"></div>
                    <span>Cryptographic Voting</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #4facfe;"></div>
                    <span>Censorship Resistance</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #43e97b;"></div>
                    <span>Security & Testing</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #f5576c;"></div>
                    <span>Documentation & Launch</span>
                </div>
            </div>
            
            <div class="legend-section">
                <h4>Connections</h4>
                <div class="legend-item">
                    <div class="legend-line" style="background: rgba(102, 126, 234, 0.7); height: 3px;"></div>
                    <span>Direct Dependency</span>
                </div>
                <div class="legend-item">
                    <div class="legend-line" style="background: rgba(102, 126, 234, 0.3); height: 2px; background-image: repeating-linear-gradient(90deg, rgba(102, 126, 234, 0.3) 0, rgba(102, 126, 234, 0.3) 4px, transparent 4px, transparent 8px);"></div>
                    <span>Indirect Connection</span>
                </div>
                <div class="legend-item">
                    <div class="legend-line" style="background: rgba(245, 87, 108, 0.7); height: 3px;"></div>
                    <span>Critical Path</span>
                </div>
            </div>
        </div>
        
        <div class="info-panel" id="infoPanel">
            <button class="close-btn" onclick="closeInfo()">&times;</button>
            <h3 id="infoTitle">Task Details</h3>
            <div id="infoContent"></div>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-number" id="visibleNodes">0</div>
                <div class="stat-label">Tasks</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="visibleLinks">0</div>
                <div class="stat-label">Connections</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="totalHours">0</div>
                <div class="stat-label">Hours</div>
            </div>
        </div>
    </div>

    <script src="wbs-complete-data.js"></script>
    <script>
        // This will be loaded from external file
        // For now, using inline minimal dataset
        
        const milestoneColors = {
            1: "#667eea",
            2: "#764ba2",
            3: "#f093fb",
            4: "#4facfe",
            5: "#43e97b",
            6: "#f5576c"
        };

        // SVG setup
        const width = window.innerWidth;
        const height = window.innerHeight;
        
        const svg = d3.select("#graph")
            .attr("width", width)
            .attr("height", height);

        const g = svg.append("g");
        
        const zoom = d3.zoom()
            .scaleExtent([0.05, 8])
            .on("zoom", (event) => {
                g.attr("transform", event.transform);
            });
        
        svg.call(zoom);

        // Initialize with sample data (will be replaced by full dataset)
        let tasks = window.WBS_TASKS || [];
        let links = window.WBS_LINKS || [];

        // Force simulation
        let simulation = d3.forceSimulation(tasks)
            .force("link", d3.forceLink(links).id(d => d.id).distance(100))
            .force("charge", d3.forceManyBody().strength(-200))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collision", d3.forceCollide().radius(20));

        // Draw links
        let link = g.append("g")
            .selectAll("path")
            .data(links)
            .join("path")
            .attr("class", d => `link ${d.type} ${d.critical ? 'critical' : ''}`)
            .attr("marker-end", d => d.type === 'direct' ? "url(#arrowhead)" : "");

        // Arrowhead marker
        svg.append("defs").append("marker")
            .attr("id", "arrowhead")
            .attr("viewBox", "0 -5 10 10")
            .attr("refX", 20)
            .attr("refY", 0)
            .attr("markerWidth", 6)
            .attr("markerHeight", 6)
            .attr("orient", "auto")
            .append("path")
            .attr("d", "M0,-5L10,0L0,5")
            .attr("fill", "rgba(102, 126, 234, 0.6)");

        // Link labels
        let linkLabel = g.append("g")
            .selectAll("text")
            .data(links.filter(d => d.type === 'direct'))
            .join("text")
            .attr("class", "link-label")
            .text(d => `${d.agent || ''} ${d.hours ? d.hours + 'h' : ''}`);

        // Draw nodes
        let node = g.append("g")
            .selectAll("g")
            .data(tasks)
            .join("g")
            .attr("class", d => `node ${d.parent ? 'parent' : ''} ${d.critical ? 'critical' : ''}`)
            .call(drag(simulation))
            .on("click", showInfo);

        node.append("circle")
            .attr("r", d => d.parent ? 18 : 12)
            .attr("fill", d => milestoneColors[d.milestone]);

        node.append("text")
            .attr("dy", 3)
            .text(d => d.id);

        // Update positions
        simulation.on("tick", () => {
            link.attr("d", d => {
                const dx = d.target.x - d.source.x;
                const dy = d.target.y - d.source.y;
                const dr = Math.sqrt(dx * dx + dy * dy);
                return `M${d.source.x},${d.source.y}A${dr},${dr} 0 0,1 ${d.target.x},${d.target.y}`;
            });

            linkLabel
                .attr("x", d => (d.source.x + d.target.x) / 2)
                .attr("y", d => (d.source.y + d.target.y) / 2);

            node.attr("transform", d => `translate(${d.x},${d.y})`);
        });

        // Drag behavior
        function drag(simulation) {
            function dragstarted(event) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                event.subject.fx = event.subject.x;
                event.subject.fy = event.subject.y;
            }

            function dragged(event) {
                event.subject.fx = event.x;
                event.subject.fy = event.y;
            }

            function dragended(event) {
                if (!event.active) simulation.alphaTarget(0);
                event.subject.fx = null;
                event.subject.fy = null;
            }

            return d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended);
        }

        // Show task info
        function showInfo(event, d) {
            const panel = document.getElementById("infoPanel");
            const title = document.getElementById("infoTitle");
            const content = document.getElementById("infoContent");

            title.textContent = `${d.id}: ${d.name}`;
            
            const deps = links.filter(l => l.target.id === d.id || l.target === d.id);
            const depsList = deps.map(l => {
                const sourceId = l.source.id || l.source;
                const sourceTask = tasks.find(t => t.id === sourceId);
                return `${sourceId} (${l.type})`;
            }).join(", ");
            
            content.innerHTML = `
                <div class="info-row">
                    <div class="info-label">Full Name</div>
                    <div class="info-value">${d.fullName || d.name}</div>
                </div>
                <div class="info-row">
                    <div class="info-label">Agent</div>
                    <div class="info-value">${d.agent}</div>
                </div>
                <div class="info-row">
                    <div class="info-label">Week</div>
                    <div class="info-value">Week ${d.week}</div>
                </div>
                <div class="info-row">
                    <div class="info-label">Estimated Hours</div>
                    <div class="info-value">${d.hours} hours</div>
                </div>
                <div class="info-row">
                    <div class="info-label">Critical Path</div>
                    <div class="info-value">${d.critical ? '<span class="critical-badge">CRITICAL</span>' : 'No'}</div>
                </div>
                <div class="info-row">
                    <div class="info-label">Type</div>
                    <div class="info-value">${d.parent ? 'Parent Task' : 'Subtask'}</div>
                </div>
                <div class="info-row">
                    <div class="info-label">Dependencies</div>
                    <div class="info-value">${depsList || "None"}</div>
                </div>
            `;

            panel.classList.add("active");
            node.classed("selected", n => n.id === d.id);
        }

        function closeInfo() {
            document.getElementById("infoPanel").classList.remove("active");
            node.classed("selected", false);
        }

        // Update stats
        function updateStats() {
            const visibleTasks = tasks.filter(t => t.visible !== false);
            const visibleLinks = links.filter(l => {
                const source = tasks.find(t => t.id === (l.source.id || l.source));
                const target = tasks.find(t => t.id === (l.target.id || l.target));
                return source?.visible !== false && target?.visible !== false;
            });
            const totalHours = visibleTasks.reduce((sum, t) => sum + (t.hours || 0), 0);

            document.getElementById("visibleNodes").textContent = visibleTasks.length;
            document.getElementById("visibleLinks").textContent = visibleLinks.length;
            document.getElementById("totalHours").textContent = totalHours;
        }

        // Controls
        document.getElementById("nodeSize").addEventListener("input", (e) => {
            const size = parseInt(e.target.value);
            document.getElementById("nodeSizeValue").textContent = size;
            node.select("circle").attr("r", d => d.parent ? size * 1.5 : size);
        });

        document.getElementById("forceStrength").addEventListener("input", (e) => {
            const strength = parseInt(e.target.value);
            document.getElementById("forceValue").textContent = strength;
            simulation.force("charge").strength(strength);
            simulation.alpha(0.3).restart();
        });

        document.getElementById("linkDistance").addEventListener("input", (e) => {
            const distance = parseInt(e.target.value);
            document.getElementById("linkDistValue").textContent = distance;
            simulation.force("link").distance(distance);
            simulation.alpha(0.3).restart();
        });

        // Search
        document.getElementById("searchBox").addEventListener("input", (e) => {
            const query = e.target.value.toLowerCase();
            if (query) {
                node.style("opacity", d => {
                    const match = d.id.toLowerCase().includes(query) || 
                                  d.name.toLowerCase().includes(query) ||
                                  (d.fullName && d.fullName.toLowerCase().includes(query));
                    return match ? 1 : 0.2;
                });
            } else {
                node.style("opacity", 1);
            }
        });

        // Initial stats
        updateStats();
        
        // Show loading message if no data
        if (tasks.length === 0) {
            const message = g.append("text")
                .attr("x", width / 2)
                .attr("y", height / 2)
                .attr("text-anchor", "middle")
                .attr("fill", "#667eea")
                .attr("font-size", "24px")
                .text("Loading complete task data...");
        }
    </script>
</body>
</html>
