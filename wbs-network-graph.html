// Compute node types: start (no incoming direct), merge (>1 incoming direct), end
function computeNodeTypes(){
  const inc=new Map();
  nodes.forEach(n=>inc.set(n.id,0));
  edges.forEach(e=>{let c=inc.get(e[1])||0;inc.set(e[1],c+1)});
  nodes.forEach(n=>{
    n.inDeg=inc.get(n.id)||0;
    n.outDeg=edges.filter(e=>e[0]===n.id).length;
    if(n.id==="6.5.6")n.type="end";
    else if(n.inDeg===0)n.type="start";
    else if(n.inDeg>1)n.type="merge";
    else n.type="normal";
  });
}
computeNodeTypes();

// Ancestors & descendants (direct only)
function getAncestors(id){
  const s=new Set(),q=[id];
  while(q.length){const c=q.pop();edges.forEach(e=>{if(e[1]===c&&!s.has(e[0])){s.add(e[0]);q.push(e[0])}});}
  return s;
}
function getDescendants(id){
  const s=new Set(),q=[id];
  while(q.length){const c=q.pop();edges.forEach(e=>{if(e[0]===c&&!s.has(e[1])){s.add(e[1]);q.push(e[1])}});}
  return s;
}

// Critical path: longest path from start nodes to given node, or from node to 6.5.6
function criticalPathTo(targetId){
  // BFS topological longest path from all start nodes to target
  const dist=new Map(),prev=new Map();
  nodes.forEach(n=>dist.set(n.id,-Infinity));
  // find start nodes
  const starts=nodes.filter(n=>n.type==="start").map(n=>n.id);
  starts.forEach(s=>dist.set(s,nodeMap.get(s).hours));
  // topological sort
  const inDeg=new Map();
  nodes.forEach(n=>inDeg.set(n.id,0));
  edges.forEach(e=>inDeg.set(e[1],(inDeg.get(e[1])||0)+1));
  const q=[];
  nodes.forEach(n=>{if(inDeg.get(n.id)===0)q.push(n.id)});
  const order=[];
  while(q.length){
    const u=q.shift();order.push(u);
    edges.forEach(e=>{if(e[0]===u){inDeg.set(e[1],inDeg.get(e[1])-1);if(inDeg.get(e[1])===0)q.push(e[1])}});
  }
  order.forEach(u=>{
    edges.forEach(e=>{
      if(e[0]===u){
        const w=dist.get(u)+(nodeMap.get(e[1])?nodeMap.get(e[1]).hours:0);
        if(w>dist.get(e[1])){dist.set(e[1],w);prev.set(e[1],u)}
      }
    });
  });
  // trace back from target
  const path=[targetId];
  let cur=targetId;
  while(prev.has(cur)){cur=prev.get(cur);path.unshift(cur)}
  return path;
}
function criticalPathFrom(srcId){
  // longest path from srcId to 6.5.6
  const dist=new Map(),prev=new Map();
  nodes.forEach(n=>dist.set(n.id,-Infinity));
  dist.set(srcId,nodeMap.get(srcId).hours);
  const inDeg=new Map();
  nodes.forEach(n=>inDeg.set(n.id,0));
  edges.forEach(e=>inDeg.set(e[1],(inDeg.get(e[1])||0)+1));
  const q=[];
  nodes.forEach(n=>{if(inDeg.get(n.id)===0)q.push(n.id)});
  const order=[];
  while(q.length){
    const u=q.shift();order.push(u);
    edges.forEach(e=>{if(e[0]===u){inDeg.set(e[1],inDeg.get(e[1])-1);if(inDeg.get(e[1])===0)q.push(e[1])}});
  }
  // only process from srcId onwards
  let started=false;
  order.forEach(u=>{
    if(u===srcId)started=true;
    if(!started)return;
    edges.forEach(e=>{
      if(e[0]===u&&dist.get(u)>-Infinity){
        const w=dist.get(u)+(nodeMap.get(e[1])?nodeMap.get(e[1]).hours:0);
        if(w>dist.get(e[1])){dist.set(e[1],w);prev.set(e[1],u)}
      }
    });
  });
  const path=["6.5.6"];
  let cur="6.5.6";
  while(prev.has(cur)){cur=prev.get(cur);path.unshift(cur)}
  if(path[0]!==srcId)return [srcId];
  return path;
}

// Hover highlight
nodeG.on("mouseenter",(ev,d)=>{
  if(selectedNode)return;
  const anc=getAncestors(d.id),desc=getDescendants(d.id);
  const related=new Set([d.id,...anc,...desc]);
  nodeG.attr("opacity",n=>related.has(n.id)?1:0.15);
  linkSel.attr("opacity",l=>{
    const s=typeof l.source==="object"?l.source.id:l.source;
    const t=typeof l.target==="object"?l.target.id:l.target;
    return related.has(s)&&related.has(t)?1:0.08;
  }).attr("stroke",l=>{
    const s=typeof l.source==="object"?l.source.id:l.source;
    const t=typeof l.target==="object"?l.target.id:l.target;
    return (anc.has(s)||s===d.id)&&(desc.has(t)||t===d.id||anc.has(t)||s===d.id)?"#58a6ff":"#30363d";

  const related=new Set([d.id,...anc,...desc]);
  nodeG.attr("opacity",n=>related.has(n.id)?1:0.15);
  linkSel.attr("opacity",l=>{
    const s=l.source.id||l.source,t=l.target.id||l.target;
    return related.has(s)&&related.has(t)?1:0.08;
  }).attr("stroke",l=>{
    const s=l.source.id||l.source,t=l.target.id||l.target;
    return related.has(s)&&related.has(t)?"#58a6ff":"#30363d";
  });
  showInfoPanel(d);
}
function deselectNode(){
  selectedNode=null;editMode=false;
  nodeG.attr("opacity",1);

  // Dependency reasons for incoming
  const inReasons=parents.map(p=>{const k=p+">"+d.id;return DR[k]?`<span style="color:#58a6ff">${p}</span>→ ${DR[k]}`:`<span style="color:#58a6ff">${p}</span>→ (no reason)`}).join("<br>");
  // Dependency reasons for outgoing
  const outReasons=children.map(c=>{const k=d.id+">"+c;return DR[k]?`→<span style="color:#58a6ff">${c}</span>: ${DR[k]}`:`→<span style="color:#58a6ff">${c}</span>: (no reason)`}).join("<br>");

  ib.innerHTML=`
    <h3 style="color:#58a6ff;margin-bottom:8px">${d.id}: ${d.name}</h3>

    <div class="f"><span class="l">Predecessors (${parents.length}):</span><br>${inReasons||"<i>None (start node)</i>"}</div>
    <hr style="border-color:#30363d;margin:6px 0">
    <div class="f"><span class="l">Successors (${children.length}):</span><br>${outReasons||"<i>None (end node)</i>"}</div>
    ${indConn.length?`<hr style="border-color:#30363d;margin:6px 0"><div class="f"><span class="l">Indirect Connections (${indConn.length}):</span><br>${indConn.map(ic=>{
      const other=ic[0]===d.id?ic[1]:ic[0];
      return `<div class="conn-item"><span><span style="color:#f0883e">↔ ${other}</span>: ${ic[2]}</span></div>`;
    }).join("")}</div>`:""}
    <hr style="border-color:#30363d;margin:6px 0">
    <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px">
      <button onclick="showEditNode('${d.id}')">Edit Node</button>
      <button class="s" onclick="showEditConnections('${d.id}')">Edit Connections</button>
      <button class="s" onclick="showAddIndirect('${d.id}')">+ Indirect</button>
      <button class="s" onclick="highlightCriticalTo('${d.id}')">Critical Path ←</button>
      <button class="s" onclick="highlightCriticalFrom('${d.id}')">Critical Path →</button>
      ${d.id!=="6.5.6"?`<button class="warn" onclick="deleteNode('${d.id}')">Delete</button>`:""}
    </div>
  `;
  ip.style.display="block";
}

// Show link info on click
function showDirectLinkInfo(l){
  const s=l.source.id||l.source,t=l.target.id||l.target;
  const k=s+">"+t;
  const reason=DR[k]||"No reason documented";
  const ip=document.getElementById("ip"),ib=document.getElementById("ib");
  ib.innerHTML=`<h3 style="color:#58a6ff">Edge: ${s} → ${t}</h3>
    <div class="f"><span class="l">From:</span> <span class="v">${s}: ${nodeMap.get(s)?.name||"?"}</span></div>
    <div class="f"><span class="l">To:</span> <span class="v">${t}: ${nodeMap.get(t)?.name||"?"}</span></div>
    <div class="f"><span class="l">Reason:</span> <span class="v">${reason}</span></div>`;
  ip.style.display="block";
}
function showLinkInfo(l){
  const s=l.source.id||l.source,t=l.target.id||l.target;
  const ip=document.getElementById("ip"),ib=document.getElementById("ib");
  ib.innerHTML=`<h3 style="color:#f0883e">Indirect: ${s} ↔ ${t}</h3>
    <div class="f"><span class="l">From:</span> <span class="v">${s}: ${nodeMap.get(s)?.name||"?"}</span></div>
    <div class="f"><span class="l">To:</span> <span class="v">${t}: ${nodeMap.get(t)?.name||"?"}</span></div>
    <div class="f"><span class="l">Reason:</span> <span class="v">${l.reason}</span></div>`;
  ip.style.display="block";
}

// Critical path highlight
function highlightCriticalTo(id){
  const path=criticalPathTo(id);
  applyCriticalHighlight(path);
}
function highlightCriticalFrom(id){
  const path=criticalPathFrom(id);
  applyCriticalHighlight(path);
}
function applyCriticalHighlight(path){
  const pathSet=new Set(path);
  const pathEdges=new Set();
  for(let i=0;i<path.length-1;i++)pathEdges.add(path[i]+">"+path[i+1]);
  nodeG.attr("opacity",n=>pathSet.has(n.id)?1:0.1);
  nodeG.select("path").attr("stroke",n=>pathSet.has(n.id)?"#f97583":"#0d1117")
    .attr("stroke-width",n=>pathSet.has(n.id)?3:1.5);
  linkSel.attr("opacity",l=>{
    const s=l.source.id||l.source,t=l.target.id||l.target;
    return pathEdges.has(s+">"+t)?1:0.05;
  }).attr("stroke",l=>{
    const s=l.source.id||l.source,t=l.target.id||l.target;
    return pathEdges.has(s+">"+t)?"#f97583":"#30363d";
  }).attr("stroke-width",l=>{
    const s=l.source.id||l.source,t=l.target.id||l.target;
    return pathEdges.has(s+">"+t)?3:1.5;
  }).attr("marker-end",l=>{
    const s=l.source.id||l.source,t=l.target.id||l.target;
    return pathEdges.has(s+">"+t)?"url(#arr-critical)":"url(#arr-direct)";
  });
  // Show path info
  const totalHours=path.reduce((s,id)=>(nodeMap.get(id)?s+nodeMap.get(id).hours:s),0);
  const ip=document.getElementById("ip"),ib=document.getElementById("ib");
  ib.innerHTML=`<h3 style="color:#f97583">Critical Path (${path.length} nodes, ${totalHours}h)</h3>
    <div style="font-size:11px;line-height:1.6">${path.map((id,i)=>`<span style="color:${MC[nodeMap.get(id)?.milestone||1]}">${id}</span>${i<path.length-1?" → ":""}`).join("")}</div>
    <div style="margin-top:6px"><button class="s" onclick="deselectNode()">Clear</button></div>`;
  ip.style.display="block";
}

// === TOOLBAR FUNCTIONS ===
function togglePhysics(){
  physicsOn=!physicsOn;
  document.getElementById("physBtn").textContent="Physics: "+(physicsOn?"ON":"OFF");
  document.getElementById("physBtn").classList.toggle("on",physicsOn);
  if(physicsOn){nodes.forEach(n=>{n.fx=null;n.fy=null});sim.alpha(0.3).restart()}
  else{nodes.forEach(n=>{n.fx=n.x;n.fy=n.y});sim.stop()}
}
function toggleIndirect(){
  showIndirect=!showIndirect;
  document.getElementById("indBtn").textContent="Indirect: "+(showIndirect?"ON":"OFF");
  document.getElementById("indBtn").classList.toggle("on",showIndirect);
  indLinkG.style("display",showIndirect?null:"none");
  if(showIndirect){
    sim.force("indLink",d3.forceLink(indirectLinks).id(d=>d.id).distance(150).strength(0.05));
  }else{
    sim.force("indLink",null);
  }
  sim.alpha(0.3).restart();
}
function centerGraph(){
  svg.transition().duration(500).call(zoom.transform,d3.zoomIdentity.translate(W/2,H/2).scale(0.8).translate(-W/2,-H/2));
}
function resetView(){
  deselectNode();
  document.getElementById("mf").value="all";
  document.getElementById("af").value="all";
  document.getElementById("sb").value="";
  nodeG.attr("opacity",1).style("display",null);
  linkSel.attr("opacity",1).attr("stroke","#30363d").attr("stroke-width",1.5).attr("marker-end","url(#arr-direct)").style("display",null);
  centerGraph();
}

// Milestone filter
document.getElementById("mf").addEventListener("change",function(){
  const v=this.value;
  if(v==="all"){nodeG.style("display",null);linkSel.style("display",null);return}
  const m=parseInt(v);
  nodeG.style("display",n=>n.milestone===m?null:"none");
  linkSel.style("display",l=>{
    const s=l.source.id||l.source,t=l.target.id||l.target;
    const sn=nodeMap.get(s),tn=nodeMap.get(t);
    return sn&&tn&&sn.milestone===m&&tn.milestone===m?null:"none";
  });
});

// Agent filter
document.getElementById("af").addEventListener("change",function(){
  const v=this.value;
  if(v==="all"){nodeG.attr("opacity",1);return}
  nodeG.attr("opacity",n=>n.agent.includes(v)?1:0.12);
});

// Search
document.getElementById("sb").addEventListener("input",function(){
  const q=this.value.toLowerCase().trim();
  if(!q){nodeG.attr("opacity",1);linkSel.attr("opacity",1);return}
  nodeG.attr("opacity",n=>(n.id.toLowerCase().includes(q)||n.name.toLowerCase().includes(q))?1:0.1);
  linkSel.attr("opacity",0.15);
});

// === MODAL SYSTEM ===
function openModal(html){
  document.getElementById("modal").innerHTML=html;
  document.getElementById("overlay").style.display="flex";
}
function closeModal(ev){
  if(ev&&ev.target!==document.getElementById("overlay"))return;
  document.getElementById("overlay").style.display="none";
}
function closeModalForce(){document.getElementById("overlay").style.display="none"}

// === ADD NODE ===
function showAddNode(){
  const allIds=nodes.map(n=>n.id).sort();
  openModal(`<h3>Add New Node</h3>
    <div class="edit-row"><label>ID:</label><input id="an_id" placeholder="e.g. 2.5.1"></div>
    <div class="edit-row"><label>Name:</label><input id="an_name" placeholder="Task name"></div>
    <div class="edit-row"><label>Agent:</label><select id="an_agent">${AGENTS.map(a=>`<option>${a}</option>`).join("")}</select></div>
    <div class="edit-row"><label>Hours:</label><input id="an_hours" type="number" value="8"></div>
    <div class="edit-row"><label>Parent Task:</label><input id="an_parent" placeholder="e.g. 2.5"></div>
    <div class="edit-row"><label>Predecessor:</label><select id="an_pred"><option value="">(none)</option>${allIds.map(id=>`<option value="${id}">${id}: ${nodeMap.get(id).name}</option>`).join("")}</select></div>
    <div class="edit-row"><label>Successor:</label><select id="an_succ"><option value="">(none)</option>${allIds.map(id=>`<option value="${id}">${id}: ${nodeMap.get(id).name}</option>`).join("")}</select></div>
    <div style="margin-top:10px;display:flex;gap:6px">
      <button onclick="addNode()">Add</button>
      <button class="s" onclick="closeModalForce()">Cancel</button>
    </div>`);
}
function addNode(){
  const id=document.getElementById("an_id").value.trim();
  const name=document.getElementById("an_name").value.trim();
  const agent=document.getElementById("an_agent").value;
  const hours=parseInt(document.getElementById("an_hours").value)||8;
  const parent=document.getElementById("an_parent").value.trim();
  const pred=document.getElementById("an_pred").value;
  const succ=document.getElementById("an_succ").value;
  if(!id||!name){alert("ID and Name required");return}
  if(nodeMap.has(id)){alert("ID already exists");return}
  const milestone=parseInt(id.split(".")[0]);
  const n={id,name,agent,hours,parent:parent||id.split(".").slice(0,2).join("."),milestone};
  nodes.push(n);nodeMap.set(id,n);
  if(pred)edges.push([pred,id]);
  if(succ)edges.push([id,succ]);
  computeNodeTypes();
  rebuildGraph();
  closeModalForce();
}

// === EDIT NODE ===
function showEditNode(id){
  const d=nodeMap.get(id);if(!d)return;
  openModal(`<h3>Edit Node: ${id}</h3>
    <div class="edit-row"><label>Name:</label><input id="en_name" value="${d.name}"></div>
    <div class="edit-row"><label>Agent:</label><select id="en_agent">${AGENTS.map(a=>`<option${a===d.agent?" selected":""}>${a}</option>`).join("")}</select></div>
    <div class="edit-row"><label>Hours:</label><input id="en_hours" type="number" value="${d.hours}"></div>
    <div class="edit-row"><label>Parent Task:</label><input id="en_parent" value="${d.parent}"></div>
    <div style="margin-top:10px;display:flex;gap:6px">
      <button onclick="applyEditNode('${id}')">Save</button>
      <button class="s" onclick="closeModalForce()">Cancel</button>
    </div>`);
}
function applyEditNode(id){
  const d=nodeMap.get(id);if(!d)return;
  d.name=document.getElementById("en_name").value.trim()||d.name;
  d.agent=document.getElementById("en_agent").value;
  d.hours=parseInt(document.getElementById("en_hours").value)||d.hours;
  d.parent=document.getElementById("en_parent").value.trim()||d.parent;
  closeModalForce();
  rebuildGraph();
  selectNode(d);
}

// === EDIT CONNECTIONS ===
function showEditConnections(id){
  const d=nodeMap.get(id);if(!d)return;
  const parents=edges.filter(e=>e[1]===id);
  const children=edges.filter(e=>e[0]===id);
  const allIds=nodes.map(n=>n.id).filter(nid=>nid!==id).sort();
  openModal(`<h3>Connections: ${id}</h3>
    <div style="margin-bottom:8px"><span style="color:#8b949e">Predecessors:</span>
    ${parents.map(e=>`<div class="conn-item"><span>${e[0]}: ${nodeMap.get(e[0])?.name||"?"}</span><span class="rm" onclick="removeEdge('${e[0]}','${id}');showEditConnections('${id}')">✕</span></div>`).join("")}
    <div class="edit-row" style="margin-top:4px"><select id="ec_addpred"><option value="">(add predecessor)</option>${allIds.map(nid=>`<option value="${nid}">${nid}: ${nodeMap.get(nid).name}</option>`).join("")}</select>
    <button onclick="addEdgeTo('${id}');showEditConnections('${id}')">+</button></div></div>
    <div><span style="color:#8b949e">Successors:</span>
    ${children.map(e=>`<div class="conn-item"><span>${e[1]}: ${nodeMap.get(e[1])?.name||"?"}</span><span class="rm" onclick="removeEdge('${id}','${e[1]}');showEditConnections('${id}')">✕</span></div>`).join("")}
    <div class="edit-row" style="margin-top:4px"><select id="ec_addsucc"><option value="">(add successor)</option>${allIds.map(nid=>`<option value="${nid}">${nid}: ${nodeMap.get(nid).name}</option>`).join("")}</select>
    <button onclick="addEdgeFrom('${id}');showEditConnections('${id}')">+</button></div></div>
    <div style="margin-top:10px"><button class="s" onclick="closeModalForce();selectNode(nodeMap.get('${id}'))">Done</button></div>`);
}
function removeEdge(s,t){
  const i=edges.findIndex(e=>e[0]===s&&e[1]===t);
  if(i>=0){delete DR[s+">"+t];edges.splice(i,1);computeNodeTypes();rebuildGraph()}
}
function addEdgeTo(id){
  const pred=document.getElementById("ec_addpred").value;
  if(!pred)return;
  if(edges.some(e=>e[0]===pred&&e[1]===id))return;
  edges.push([pred,id]);computeNodeTypes();rebuildGraph();
}
function addEdgeFrom(id){
  const succ=document.getElementById("ec_addsucc").value;
  if(!succ)return;
  if(edges.some(e=>e[0]===id&&e[1]===succ))return;
  edges.push([id,succ]);computeNodeTypes();rebuildGraph();
}

// === ADD INDIRECT CONNECTION ===
function showAddIndirect(id){
  const d=nodeMap.get(id);if(!d)return;
  const existing=indirectEdges.filter(e=>e[0]===id||e[1]===id);
  const allIds=nodes.map(n=>n.id).filter(nid=>nid!==id).sort();
  openModal(`<h3>Indirect Connections: ${id}</h3>
    <div style="margin-bottom:8px"><span style="color:#8b949e">Existing:</span>
    ${existing.map(e=>{
      const other=e[0]===id?e[1]:e[0];
      return `<div class="conn-item"><span style="color:#f0883e">${other}</span>: ${e[2]}<span class="rm" onclick="removeIndirect('${e[0]}','${e[1]}');showAddIndirect('${id}')">✕</span></div>`;
    }).join("")||"<div style='color:#8b949e;font-size:11px'>None</div>"}</div>
    <hr style="border-color:#30363d;margin:6px 0">
    <div class="edit-row"><label>Node:</label><select id="ai_node"><option value="">(select)</option>${allIds.map(nid=>`<option value="${nid}">${nid}: ${nodeMap.get(nid).name}</option>`).join("")}</select></div>
    <div class="edit-row"><label>Reason:</label><textarea id="ai_reason" placeholder="Why are these related?"></textarea></div>
    <div style="margin-top:8px;display:flex;gap:6px">
      <button onclick="addIndirect('${id}')">Add</button>
      <button class="s" onclick="closeModalForce();selectNode(nodeMap.get('${id}'))">Done</button>
    </div>`);
}
function addIndirect(id){
  const other=document.getElementById("ai_node").value;
  const reason=document.getElementById("ai_reason").value.trim();
  if(!other||!reason){alert("Select a node and provide a reason");return}
  if(indirectEdges.some(e=>(e[0]===id&&e[1]===other)||(e[0]===other&&e[1]===id)))return;
  indirectEdges.push([id,other,reason]);
  rebuildIndirect();
  showAddIndirect(id);
}
function removeIndirect(s,t){
  const i=indirectEdges.findIndex(e=>e[0]===s&&e[1]===t);
  if(i>=0){indirectEdges.splice(i,1);rebuildIndirect()}
}

// === DELETE NODE ===
function deleteNode(id){
  if(!confirm(`Delete node ${id}?`))return;
  const i=nodes.findIndex(n=>n.id===id);
  if(i>=0)nodes.splice(i,1);
  nodeMap.delete(id);
  // remove edges involving this node
  for(let j=edges.length-1;j>=0;j--){if(edges[j][0]===id||edges[j][1]===id){delete DR[edges[j][0]+">"+edges[j][1]];edges.splice(j,1)}}
  for(let j=indirectEdges.length-1;j>=0;j--){if(indirectEdges[j][0]===id||indirectEdges[j][1]===id)indirectEdges.splice(j,1)}
  computeNodeTypes();
  deselectNode();
  rebuildGraph();
}

// === REBUILD GRAPH (after add/edit/delete) ===
function rebuildGraph(){
  // Rebuild links
  links=edges.map(e=>({source:e[0],target:e[1],type:"direct"}));
  indirectLinks=indirectEdges.map(e=>({source:e[0],target:e[1],type:"indirect",reason:e[2]}));

  // Remove old elements
  g.selectAll("*").remove();

  // Redraw indirect links
  const newIndG=g.append("g").attr("class","ind-links").style("display",showIndirect?null:"none");
  const newIndSel=newIndG.selectAll("line").data(indirectLinks).join("line")
    .attr("stroke","#f0883e").attr("stroke-width",1.5).attr("stroke-dasharray","6,4")
    .attr("opacity",0.6).attr("marker-end","url(#arr-indirect)")
    .style("cursor","pointer").on("click",(ev,d)=>{ev.stopPropagation();showLinkInfo(d)});

  // Redraw direct links
  const newLinkSel=g.append("g").selectAll("line").data(links).join("line")
    .attr("stroke","#30363d").attr("stroke-width",1.5).attr("marker-end","url(#arr-direct)")
    .style("cursor","pointer").on("click",(ev,d)=>{ev.stopPropagation();showDirectLinkInfo(d)});

  // Redraw nodes
  const newNodeG=g.append("g").selectAll("g").data(nodes,d=>d.id).join("g")
    .style("cursor","pointer")
    .call(d3.drag().on("start",dragS).on("drag",dragD).on("end",dragE));

  newNodeG.append("path").attr("d",d=>{
    if(d.type==="end")return d3.symbol().type(d3.symbolStar).size(300)();
    if(d.type==="merge")return d3.symbol().type(d3.symbolDiamond).size(250)();
    return d3.symbol().type(d3.symbolCircle).size(200)();
  }).attr("fill",d=>MC[d.milestone]).attr("stroke","#0d1117").attr("stroke-width",1.5);

  newNodeG.append("text").text(d=>d.id).attr("dy",d=>d.type==="end"?-14:-12)
    .attr("text-anchor","middle").attr("fill","#8b949e").attr("font-size","9px");

  newNodeG.on("mouseenter",(ev,d)=>{
    if(selectedNode)return;
    const anc=getAncestors(d.id),desc=getDescendants(d.id);
    const related=new Set([d.id,...anc,...desc]);
    newNodeG.attr("opacity",n=>related.has(n.id)?1:0.15);
    newLinkSel.attr("opacity",l=>{
      const s=l.source.id||l.source,t=l.target.id||l.target;
      return related.has(s)&&related.has(t)?1:0.08;
    }).attr("stroke",l=>{
      const s=l.source.id||l.source,t=l.target.id||l.target;
      return related.has(s)&&related.has(t)?"#58a6ff":"#30363d";
    });
  }).on("mouseleave",()=>{
    if(selectedNode)return;
    newNodeG.attr("opacity",1);
    newLinkSel.attr("opacity",1).attr("stroke","#30363d");
  });
  newNodeG.on("click",(ev,d)=>{ev.stopPropagation();selectNode(d)});

  // Update references for global use
  Object.assign(linkSel,newLinkSel);
  Object.assign(indLinkSel,newIndSel);

  // Restart simulation
  sim.nodes(nodes);
  sim.force("link",d3.forceLink(links).id(d=>d.id).distance(80).strength(0.4));
  if(showIndirect)sim.force("indLink",d3.forceLink(indirectLinks).id(d=>d.id).distance(150).strength(0.05));
  sim.on("tick",()=>{
    newLinkSel.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
      .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
    newIndSel.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
      .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
    newNodeG.attr("transform",d=>`translate(${d.x},${d.y})`);
  });
  sim.alpha(0.5).restart();
  updateStats();
}

function rebuildIndirect(){
  indirectLinks=indirectEdges.map(e=>({source:e[0],target:e[1],type:"indirect",reason:e[2]}));
  rebuildGraph();
}

</script>
